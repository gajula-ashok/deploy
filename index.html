<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Web Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="fade-in">
        <h1>Welcome to My Animated Website</h1>
        <p>Now with smooth animations ✨</p>
    </header>

    <nav class="slide-down">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <section class="card fade-in">
            <h2>About This Page</h2>
            <p>This page uses CSS animations like fade-in and hover effects.</p>
        </section>

        <section class="card fade-in delay">
            <h2>Try This Button</h2>
            <button class="animated-btn">Hover Me</button>
        </section>
    </main>

    <footer class="fade-in">
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
